workflows:
  ios-build:
    name: Build iOS IPA
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 18.17.0
      xcode: 15.4
      vars:
        BUNDLE_ID: "com.thep.budgeting"
        APP_NAME: "TheP Budgeting"
    scripts:
      - name: Create www folder
        script: |
          mkdir -p www
          cp index.html www/index.html
      - name: Install dependencies
        script: npm install
      - name: Add iOS platform
        script: npx cap add ios
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Build iOS
        script: |
          cd ios/App
          xcodebuild build -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            archive
    artifacts:
      - ios/App/build/**/*.xcarchive

  android-build:
    name: Build Android APK
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      node: 18.17.0
      java: 17
    scripts:
      - name: Create www folder
        script: |
          mkdir -p www
          cp index.html www/index.html
      - name: Install dependencies
        script: npm install
      - name: Add Android platform
        script: npx cap add android
      - name: Sync Capacitor
        script: npx cap sync android
      - name: Build APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/**/*.apk
