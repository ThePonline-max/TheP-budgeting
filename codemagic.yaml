workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - apple_credentials
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.thep.budgeting
      vars:
        BUNDLE_ID: com.thep.budgeting
      node: 18
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Prepare web assets
        script: |
          mkdir -p www
          cp index.html www/
      - name: Add iOS platform
        script: npx cap add ios || true
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Update version
        script: |
          cd ios/App/App
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 3" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0.2" Info.plist
      - name: Pod install
        script: cd ios/App && pod install
      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles
          echo "=== Profiles ==="
          ls ~/Library/MobileDevice/Provisioning\ Profiles/ || echo "No profiles found"
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
