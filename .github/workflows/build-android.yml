name: Build Android AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Prepare web assets
        run: |
          mkdir -p www
          cp index.html www/

      - name: Add Android platform
        run: npx cap add android || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Update target SDK and version code
        run: |
          cat android/variables.gradle
          sed -i "s/targetSdkVersion = .*/targetSdkVersion = 35/" android/variables.gradle
          sed -i "s/versionCode 1/versionCode 2/" android/app/build.gradle
          echo "=== After fix ==="
          cat android/variables.gradle

      - name: Decode keystore
        run: echo "$KEYSTORE_B64" | base64 --decode > android/app/thep-release-key.jks
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Add signing config
        env:
          STORE_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_AL: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
        run: |
          sed -i "/defaultConfig {/i\\
              signingConfigs {\\
                  release {\\
                      storeFile file(\"thep-release-key.jks\")\\
                      storePassword \"$STORE_PASS\"\\
                      keyAlias \"$KEY_AL\"\\
                      keyPassword \"$KEY_PASS\"\\
                  }\\
              }" android/app/build.gradle
          sed -i "/release {/a\\
                      signingConfig signingConfigs.release" android/app/build.gradle

      - name: Build signed AAB
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew bundleRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: TheP-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
