name: Build Android AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android || true
      - name: Prepare web assets
        run: |
          mkdir -p www
          cp index.html www/
      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode keystore
        run: echo "$KEYSTORE_B64" | base64 --decode > android/app/thep-release-key.jks
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Set up signing
        run: |
          cat >> android/app/gradle.properties << EOF
          RELEASE_STORE_FILE=thep-release-key.jks
          RELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Add signing config to build.gradle
        run: |
          sed -i '/android {/a \    signingConfigs {\n        release {\n            storeFile file(project.property("RELEASE_STORE_FILE"))\n            storePassword project.property("RELEASE_STORE_PASSWORD")\n            keyAlias project.property("RELEASE_KEY_ALIAS")\n            keyPassword project.property("RELEASE_KEY_PASSWORD")\n        }\n    }' android/app/build.gradle
          sed -i '/buildTypes {/,/release {/{s/release {/release {\n            signingConfig signingConfigs.release/}' android/app/build.gradle

      - name: Build signed AAB
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew bundleRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: TheP-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
