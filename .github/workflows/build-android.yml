name: Build Android AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Prepare web assets
        run: |
          mkdir -p www
          cp index.html www/

      - name: Add Android platform
        run: npx cap add android || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Update target SDK
        run: |
          grep -rl "targetSdk" android/ --include="*.gradle*" | xargs sed -i 's/targetSdk\s*=\s*[0-9]*/targetSdk = 35/g'
          grep -rl "targetSdkVersion" android/ --include="*.gradle*" | xargs sed -i 's/targetSdkVersion\s*[0-9]*/targetSdkVersion 35/g'

      - name: Build AAB
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew bundleRelease

      - name: Sign AAB
        run: |
          echo "$KEYSTORE_B64" | base64 --decode > keystore.jks
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore keystore.jks \
            -storepass "$STORE_PASS" \
            -keypass "$KEY_PASS" \
            android/app/build/outputs/bundle/release/app-release.aab "$KEY_AL"
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_AL: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: TheP-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
